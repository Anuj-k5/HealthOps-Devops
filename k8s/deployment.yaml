apiVersion: apps/v1
kind: Deployment

metadata:
  name: healthops-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: healthops-app

  template:
    metadata:
      labels:
        app: healthops-app

    spec:
      containers:
      - name: healthops-app

        image: anujk5/healthops:latest

        ports:
        - containerPort: 5000