apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: healthops
data:
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: HealthOps
        orgId: 1
        folder: HealthOps
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
