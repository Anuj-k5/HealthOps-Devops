apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: healthops
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.healthops.svc.cluster.local:9090
        isDefault: true
        editable: false
