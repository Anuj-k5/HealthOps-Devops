{% extends 'base.html' %}

{% block title %}Add Patient{% endblock %}

{% block content %}
<div class="card">
    <h2 class="card-title">Add New Patient</h2>
    <form method="POST" action="{{ url_for('add_patient') }}">
        <div class="form-group">
            <label class="form-label" for="name">Patient Name</label>
            <input class="form-control" type="text" id="name" name="name" required placeholder="Enter full name">
        </div>
        <div class="form-group">
            <label class="form-label" for="age">Age</label>
            <input class="form-control" type="number" id="age" name="age" required placeholder="Enter age">
        </div>
        <div class="form-group">
            <label class="form-label" for="disease">Disease / Condition</label>
            <input class="form-control" type="text" id="disease" name="disease" required placeholder="Enter diagnosis">
        </div>
        <button class="btn" type="submit">Add Patient</button>
    </form>
</div>
{% endblock %}
