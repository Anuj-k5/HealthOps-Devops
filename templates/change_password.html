{% extends 'base.html' %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Change Password</h1>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); border: 1px solid #e2e8f0;">
    <div style="padding: 2rem;">
        <form method="POST" action="{{ url_for('change_password') }}">
            
            <!-- Current Password -->
            <div class="mb-4">
                <label class="form-label fw-bold" for="current_password" style="color: #334155; font-size: 0.9rem;">Current Password</label>
                <div class="input-group">
                    <span class="input-group-text" style="background:#f8fafc; border-color:#cbd5e1; color:#64748b;">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input class="form-control" type="password" id="current_password" name="current_password" required placeholder="Enter current password" style="border-color:#cbd5e1;">
                    <button class="btn btn-outline-secondary toggle-pw" type="button" data-target="current_password" style="border-color:#cbd5e1;">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- New Password -->
            <div class="mb-4">
                <label class="form-label fw-bold" for="new_password" style="color: #334155; font-size: 0.9rem;">New Password</label>
                <div class="input-group">
                    <span class="input-group-text" style="background:#f8fafc; border-color:#cbd5e1; color:#64748b;">
                        <i class="fa-solid fa-key"></i>
                    </span>
                    <input class="form-control" type="password" id="new_password" name="new_password" required placeholder="Enter new password" style="border-color:#cbd5e1;">
                    <button class="btn btn-outline-secondary toggle-pw" type="button" data-target="new_password" style="border-color:#cbd5e1;">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-5">
                <label class="form-label fw-bold" for="confirm_password" style="color: #334155; font-size: 0.9rem;">Confirm New Password</label>
                <div class="input-group">
                    <span class="input-group-text" style="background:#f8fafc; border-color:#cbd5e1; color:#64748b;">
                        <i class="fa-solid fa-shield-check"></i>
                    </span>
                    <input class="form-control" type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm new password" style="border-color:#cbd5e1;">
                    <button class="btn btn-outline-secondary toggle-pw" type="button" data-target="confirm_password" style="border-color:#cbd5e1;">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn w-100 fw-bold" style="background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); color: white; border: none; padding: 0.75rem; border-radius: 8px;">
                Update Password
            </button>
        </form>
    </div>
</div>

<script>
    document.querySelectorAll('.toggle-pw').forEach(btn => {
        btn.addEventListener('click', function() {
            const targetId = this.getAttribute('data-target');
            const input = document.getElementById(targetId);
            const icon = this.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    });
</script>
{% endblock %}
