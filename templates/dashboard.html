{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Dashboard</h1>
</div>

<div class="dashboard-grid">
    <div class="stat-card">
        <div class="stat-icon">
            <i class="fa-solid fa-users"></i>
        </div>
        <div class="stat-info">
            <h3>Manage Patients</h3>
            <p><a href="{{ url_for('view_patients') }}" style="color: inherit; text-decoration: none;">View All</a></p>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon">
            <i class="fa-solid fa-user-plus"></i>
        </div>
        <div class="stat-info">
            <h3>New Patient</h3>
            <p><a href="{{ url_for('add_patient') }}" style="color: inherit; text-decoration: none;">Add Records</a></p>
        </div>
    </div>
</div>
{% endblock %}
