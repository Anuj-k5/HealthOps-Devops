{% extends 'auth_base.html' %}

{% block title %}Sign In{% endblock %}

{% block content %}
<div class="auth-card">
    <h2 class="card-heading">Welcome Back</h2>
    <p class="card-subheading">Sign in to access your healthcare dashboard</p>

    <form method="POST" action="{{ url_for('login') }}" id="loginForm">
        <!-- Username -->
        <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <div class="input-group">
                <span class="input-group-text" style="border-radius:.6rem 0 0 .6rem; border:1.5px solid #cbd5e1; border-right:0; background:#f8fafc; color:#64748b;">
                    <i class="fa-solid fa-user"></i>
                </span>
                <input class="form-control" type="text" id="username" name="username"
                       required autofocus placeholder="Enter your username"
                       style="border-radius:0 .6rem .6rem 0;">
            </div>
        </div>

        <!-- Password with show/hide -->
        <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <div class="input-group">
                <span class="input-group-text" style="border-radius:.6rem 0 0 .6rem; border:1.5px solid #cbd5e1; border-right:0; background:#f8fafc; color:#64748b;">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input class="form-control" type="password" id="password" name="password"
                       required placeholder="Enter your password"
                       style="border-right:0; border-radius:0;">
                <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                        aria-label="Toggle password visibility"
                        style="border-left:0;">
                    <i class="fa-solid fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <!-- Remember me / Forgot password -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember" name="remember">
                <label class="form-check-label" for="remember">Remember me</label>
            </div>
            <a href="{{ url_for('forgot_password') }}" class="text-decoration-none" style="font-size:.88rem; font-weight:600; color:var(--ho-primary);">
                Forgot Password?
            </a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-ho-primary" id="loginBtn">
            <i class="fa-solid fa-right-to-bracket me-1"></i> Sign In
        </button>
    </form>

    <div class="auth-links">
        Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    // Show / hide password toggle
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    toggleBtn.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        eyeIcon.classList.toggle('fa-eye', !isPassword);
        eyeIcon.classList.toggle('fa-eye-slash', isPassword);
    });
</script>
{% endblock %}
