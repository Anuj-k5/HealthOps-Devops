{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="card">
    <h2 class="card-title">Create an Account</h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input class="form-control" type="text" id="username" name="username" required autofocus placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" type="password" id="password" name="password" required placeholder="Create a password">
        </div>
        <button class="btn" type="submit">Register</button>
    </form>
    <div class="auth-links">
        <p>Already have an account? <a href="{{ url_for('login') }}">Sign in here</a></p>
    </div>
</div>
{% endblock %}
