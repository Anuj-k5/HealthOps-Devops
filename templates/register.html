{% extends 'auth_base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-card">
    <h2 class="card-heading">Create an Account</h2>
    <p class="card-subheading">Join HealthOps to manage your healthcare dashboard</p>

    <form method="POST" action="{{ url_for('register') }}" id="registerForm">
        <!-- Username -->
        <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <div class="input-group">
                <span class="input-group-text" style="border-radius:.6rem 0 0 .6rem; border:1.5px solid #cbd5e1; border-right:0; background:#f8fafc; color:#64748b;">
                    <i class="fa-solid fa-user"></i>
                </span>
                <input class="form-control" type="text" id="username" name="username"
                       required autofocus placeholder="Choose a username"
                       style="border-radius:0 .6rem .6rem 0;">
            </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label" for="email">Email Address</label>
            <div class="input-group">
                <span class="input-group-text" style="border-radius:.6rem 0 0 .6rem; border:1.5px solid #cbd5e1; border-right:0; background:#f8fafc; color:#64748b;">
                    <i class="fa-solid fa-envelope"></i>
                </span>
                <input class="form-control" type="email" id="email" name="email"
                       required placeholder="Enter your email"
                       style="border-radius:0 .6rem .6rem 0;">
            </div>
        </div>

        <!-- Password with show/hide -->
        <div class="mb-4">
            <label class="form-label" for="password">Password</label>
            <div class="input-group">
                <span class="input-group-text" style="border-radius:.6rem 0 0 .6rem; border:1.5px solid #cbd5e1; border-right:0; background:#f8fafc; color:#64748b;">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input class="form-control" type="password" id="password" name="password"
                       required placeholder="Create a password"
                       style="border-right:0; border-radius:0;">
                <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                        aria-label="Toggle password visibility"
                        style="border-left:0;">
                    <i class="fa-solid fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-ho-primary" id="registerBtn">
            <i class="fa-solid fa-user-plus me-1"></i> Register
        </button>
    </form>

    <div class="auth-links">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    toggleBtn.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        eyeIcon.classList.toggle('fa-eye', !isPassword);
        eyeIcon.classList.toggle('fa-eye-slash', isPassword);
    });
</script>
{% endblock %}
