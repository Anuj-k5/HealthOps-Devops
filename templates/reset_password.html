{% extends 'auth_base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-card">
    <h2 class="card-heading">Reset Your Password</h2>
    <p class="card-subheading">Choose a new password for your account</p>

    <form method="POST" action="{{ url_for('reset_password', token=token) }}" id="resetForm">
        <!-- New password -->
        <div class="mb-3">
            <label class="form-label" for="password">New Password</label>
            <div class="input-group">
                <span class="input-group-text" style="border-radius:.6rem 0 0 .6rem; border:1.5px solid #cbd5e1; border-right:0; background:#f8fafc; color:#64748b;">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input class="form-control" type="password" id="password" name="password"
                       required autofocus placeholder="Enter new password"
                       style="border-right:0; border-radius:0;">
                <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                        aria-label="Toggle password visibility"
                        style="border-left:0;">
                    <i class="fa-solid fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <!-- Confirm password -->
        <div class="mb-4">
            <label class="form-label" for="confirm_password">Confirm Password</label>
            <div class="input-group">
                <span class="input-group-text" style="border-radius:.6rem 0 0 .6rem; border:1.5px solid #cbd5e1; border-right:0; background:#f8fafc; color:#64748b;">
                    <i class="fa-solid fa-shield-halved"></i>
                </span>
                <input class="form-control" type="password" id="confirm_password" name="confirm_password"
                       required placeholder="Re-enter new password"
                       style="border-right:0; border-radius:0;">
                <button class="btn btn-outline-secondary" type="button" id="toggleConfirm"
                        aria-label="Toggle confirm password visibility"
                        style="border-left:0;">
                    <i class="fa-solid fa-eye" id="eyeIconConfirm"></i>
                </button>
            </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-ho-primary" id="resetBtn">
            <i class="fa-solid fa-key me-1"></i> Reset Password
        </button>
    </form>

    <div class="auth-links">
        <a href="{{ url_for('login') }}">Back to Sign In</a>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    // Toggle for new password
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    toggleBtn.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        eyeIcon.classList.toggle('fa-eye', !isPassword);
        eyeIcon.classList.toggle('fa-eye-slash', isPassword);
    });

    // Toggle for confirm password
    const toggleConfirm = document.getElementById('toggleConfirm');
    const confirmInput = document.getElementById('confirm_password');
    const eyeIconConfirm = document.getElementById('eyeIconConfirm');

    toggleConfirm.addEventListener('click', () => {
        const isPassword = confirmInput.type === 'password';
        confirmInput.type = isPassword ? 'text' : 'password';
        eyeIconConfirm.classList.toggle('fa-eye', !isPassword);
        eyeIconConfirm.classList.toggle('fa-eye-slash', isPassword);
    });
</script>
{% endblock %}
