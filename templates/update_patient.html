{% extends 'base.html' %}

{% block title %}Update Patient{% endblock %}

{% block content %}
<div class="card">
    <h2 class="card-title">Update Patient Info</h2>
    <form method="POST" action="{{ url_for('update_patient', id=patient.id) }}">
        <div class="form-group">
            <label class="form-label" for="name">Patient Name</label>
            <input class="form-control" type="text" id="name" name="name" value="{{ patient.name }}" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="age">Age</label>
            <input class="form-control" type="number" id="age" name="age" value="{{ patient.age }}" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="disease">Disease / Condition</label>
            <input class="form-control" type="text" id="disease" name="disease" value="{{ patient.disease }}" required>
        </div>
        <button class="btn" type="submit">Update Record</button>
    </form>
</div>
{% endblock %}
